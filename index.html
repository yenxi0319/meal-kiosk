<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>방과후 급식관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" crossorigin />
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    :root {
      --bg: #0c0e12;
      --bg-elevated: #141821;
      --surface: #1a2030;
      --surface-2: #222a3d;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8ecf4;
      --text-muted: #8b95a8;
      --accent: #4fd1c5;
      --accent-dim: rgba(79, 209, 197, 0.15);
      --success: #34d399;
      --warning: #fbbf24;
      --danger: #f87171;
      --nav-h: 62px;
      --radius: 16px;
      --qr-panel-border: #3f3f46;
      --qr-panel-shadow: 0 10px 32px rgba(0, 0, 0, 0.38);
    }

    * { box-sizing: border-box; }

    html {
      height: 100vh;
      height: 100dvh;
      max-height: 100vh;
      max-height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      height: 100vh;
      height: 100dvh;
      max-height: 100vh;
      max-height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      display: flex;
      flex-direction: column;
    }

    /* ----------------- 상단 네비게이션 ----------------- */
    .topnav {
      flex-shrink: 0;
      height: var(--nav-h);
      min-height: var(--nav-h);
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      z-index: 50;
      gap: 14px;
    }
    .brand {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      white-space: nowrap;
    }
    .nav-tabs {
      display: flex;
      gap: 4px;
      margin-left: 12px;
    }
    .nav-btn {
      background: transparent;
      border: 0;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
    }
    .nav-btn:hover { color: var(--text); background: var(--surface); }
    .nav-btn.active { color: var(--accent); background: var(--accent-dim); }

    .clock {
      margin-left: auto;
      color: var(--text-muted);
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }

    /* ----------------- 뷰 컨테이너 ----------------- */
    main {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      padding: 4px 8px 6px;
      display: flex;
      flex-direction: column;
    }
    .view {
      display: none;
      flex: 1;
      min-height: 0;
      flex-direction: column;
      overflow: hidden;
    }
    .view.active { display: flex; }
    .view[data-view="log"],
    .view[data-view="students"] {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ----------------- QR 스캔 화면 ----------------- */
    .view[data-view="qr"] .qr-grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(0, 0.98fr);
      gap: 10px;
      align-items: stretch;
      max-width: 1480px;
      width: 100%;
      margin: 0 auto;
      height: 100%;
    }
    @media (max-width: 900px) {
      .view[data-view="qr"] .qr-grid {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1.02fr) minmax(0, 0.98fr);
        gap: 12px;
      }
    }

    .panel {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .qr-grid > .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border: 2.5px solid var(--qr-panel-border);
      box-shadow: var(--qr-panel-shadow);
    }
    .view[data-view="qr"] .panel-head {
      padding: 6px 10px;
      font-size: 12px;
    }
    .view[data-view="qr"] .panel-head .pill {
      font-size: 11px;
      padding: 2px 8px;
    }
    .panel-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .panel-head .pill {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface);
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 500;
    }
    .qr-grid .panel-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 6px 8px 8px;
    }

    /* 카메라 영역 (QR 스캐너 메인) */
    #qr-reader {
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    #qr-reader video { width: 100% !important; height: 100% !important; object-fit: cover; }
    #qr-reader__dashboard { display: none !important; }
    #qr-reader__scan_region { background: transparent !important; }
    #qr-reader__scan_region img { display: none !important; }

    .qr-controls {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: nowrap;
      flex-shrink: 0;
      align-items: center;
    }
    .view[data-view="qr"] .qr-controls .btn {
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 8px;
    }
    .qr-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      background: var(--surface);
      color: var(--text-muted);
    }
    .qr-status.ok { background: rgba(52, 211, 153, 0.15); color: var(--success); }
    .qr-status.err { background: rgba(248, 113, 113, 0.15); color: var(--danger); }

    /* 학생 정보 패널 */
    #student-panel {
      flex: 1;
      min-height: 0;
      max-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      gap: 5px;
      padding: 4px 8px 6px;
      overflow: hidden;
    }
    #student-panel.empty {
      color: var(--text-muted);
      font-size: clamp(11px, 1.4vw, 13px);
      line-height: 1.35;
      justify-content: center;
      padding: 8px 12px;
    }
    /* 고정 정사각형 프레임: 원본 비율과 무관하게 동일 크기·cover로 표시 */
    #student-panel .photo-frame {
      flex: 0 1 auto;
      width: min(100%, min(46dvh, calc(100dvh - 200px), 380px));
      max-width: 100%;
      aspect-ratio: 1;
      height: auto;
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
      border: 2.5px solid rgba(255, 255, 255, 0.45);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      flex-shrink: 1;
    }
    #student-panel .photo {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      border-radius: 0;
      border: 0;
      box-shadow: none;
      background: var(--surface);
    }
    #student-panel .name {
      font-size: clamp(13px, 1.9vw, 18px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      flex-shrink: 0;
    }
    #student-panel .sid {
      font-size: clamp(10px, 1.3vw, 14px);
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      flex-shrink: 0;
      line-height: 1.1;
    }
    #student-panel .greet {
      margin-top: 2px;
      padding: 6px 14px;
      background: rgba(52, 211, 153, 0.18);
      color: var(--success);
      border-radius: 999px;
      font-size: clamp(20px, 2.8vw, 28px);
      font-weight: 900;
      flex-shrink: 0;
      line-height: 1.2;
    }
    #student-panel .scan-time {
      color: var(--text-muted);
      font-size: clamp(18px, 2.4vw, 24px);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      margin-top: 2px;
      line-height: 1.15;
    }

    /* ----------------- 버튼 ----------------- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.05s;
    }
    .btn:hover { background: var(--surface-2); }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--accent);
      color: #06231f;
      border-color: var(--accent);
    }
    .btn-primary:hover { background: #6fdbcf; }
    .btn-ghost { background: transparent; }

    /* ----------------- 식사현황 ----------------- */
    .summary-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 26px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .summary-card .big {
      font-size: 48px;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .summary-card .label {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 4px;
    }
    .summary-card .date {
      font-size: 18px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .student-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }
    .student-card img {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--surface);
    }
    .student-card .nm {
      font-size: 16px;
      font-weight: 700;
    }
    .student-card .meta {
      color: var(--text-muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    .student-card .time {
      margin-top: 4px;
      padding: 3px 10px;
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .empty-state {
      padding: 60px 0;
      text-align: center;
      color: var(--text-muted);
    }

    /* 학생정보 검색 */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .toolbar input {
      flex: 1;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
    }
    .toolbar input:focus { outline: none; border-color: var(--accent); }

    /* ----------------- 모달 ----------------- */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
      backdrop-filter: blur(6px);
    }
    .modal.is-open { display: flex; }
    .modal-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px 28px;
      max-width: 460px;
      width: 100%;
      text-align: center;
    }
    .modal-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 900;
    }
    .modal-icon.warn { background: rgba(248, 113, 113, 0.18); color: var(--danger); }
    .modal-icon.info { background: rgba(251, 191, 36, 0.18); color: var(--warning); }
    .modal-card h2 {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 800;
    }
    .modal-card p {
      margin: 0 0 20px;
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.5;
    }
    .modal-card .btn { width: 100%; padding: 14px; font-size: 15px; }

    /* 학생 상세 이력 모달 (#34495e 테두리 3px, 큰 글자) */
    #student-detail-modal .student-detail-card {
      background: var(--bg-elevated);
      border: 3px solid #34495e;
      border-radius: 20px;
      max-width: min(520px, 100%);
      width: 100%;
      max-height: min(92dvh, 92vh);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      text-align: center;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.45);
    }
    #student-detail-modal .student-detail-head {
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 10px 10px 0;
      flex-shrink: 0;
    }
    #student-detail-modal .student-detail-close {
      background: var(--surface);
      border: 2px solid #34495e;
      color: var(--text);
      width: 48px;
      height: 48px;
      border-radius: 12px;
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #student-detail-modal .student-detail-close:hover {
      background: var(--surface-2);
    }
    #student-detail-modal .student-detail-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 0 22px 22px;
      gap: 16px;
    }
    #student-detail-modal .student-detail-photo-wrap {
      width: 100%;
      max-height: min(38dvh, 320px);
      flex-shrink: 0;
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid #34495e;
      background: var(--surface);
      margin: 0 auto;
    }
    #student-detail-modal .student-detail-photo {
      display: block;
      width: 100%;
      height: 100%;
      max-height: min(38dvh, 320px);
      object-fit: cover;
      object-position: center top;
    }
    #student-detail-modal .student-detail-title {
      font-size: clamp(22px, 4.2vw, 30px);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.25;
    }
    #student-detail-modal .student-detail-title .sid {
      display: block;
      margin-top: 6px;
      font-size: clamp(18px, 3.4vw, 24px);
      font-weight: 700;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    #student-detail-modal .student-detail-count-wrap {
      padding: 16px 20px;
      border-radius: 16px;
      border: 3px solid #34495e;
      background: var(--surface);
    }
    #student-detail-modal .student-detail-count-label {
      font-size: clamp(16px, 2.8vw, 20px);
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    #student-detail-modal .student-detail-count {
      font-size: clamp(36px, 8vw, 56px);
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    #student-detail-modal .student-detail-list-head {
      font-size: clamp(17px, 3vw, 22px);
      font-weight: 800;
      text-align: left;
      color: var(--text);
    }
    #student-detail-modal .student-detail-list {
      flex: 1;
      min-height: 120px;
      max-height: min(32dvh, 280px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      border: 3px solid #34495e;
      border-radius: 14px;
      background: var(--surface);
      text-align: left;
    }
    #student-detail-modal .student-detail-list-item {
      padding: 14px 18px;
      font-size: clamp(17px, 2.8vw, 22px);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    #student-detail-modal .student-detail-list-item:last-child {
      border-bottom: 0;
    }
    #student-detail-modal .student-detail-loading,
    #student-detail-modal .student-detail-error {
      font-size: clamp(17px, 3vw, 22px);
      padding: 24px 16px;
      color: var(--text-muted);
      font-weight: 600;
    }
    #student-detail-modal .student-detail-error {
      color: var(--danger);
    }
    .student-card.student-card--clickable {
      cursor: pointer;
      transition: transform 0.12s, border-color 0.12s, background 0.12s;
    }
    .student-card.student-card--clickable:hover {
      border-color: rgba(79, 209, 197, 0.35);
      background: var(--surface);
    }
    .student-card.student-card--clickable:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <!-- ============================================== -->
  <!--   ★ 배포 후 이 한 줄만 본인 GAS URL로 교체!     -->
  <!-- ============================================== -->
  <script>
    var GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyjTJCwF-rXrR9s0dvxNV4DBImFhF7zuYdF8LonwZkRqrC7RdS63619txRvFJEYDuGnFw/exec';
  </script>

  <header class="topnav">
    <div class="brand">● 방과후 급식관리</div>
    <nav class="nav-tabs" aria-label="주 메뉴">
      <button type="button" class="nav-btn active" data-view="qr">QR 스캔</button>
      <button type="button" class="nav-btn" data-view="log">식사현황</button>
      <button type="button" class="nav-btn" data-view="students">학생정보</button>
    </nav>
    <div class="clock" id="clock"></div>
  </header>

  <main>

    <!-- ===== QR 스캔 ===== -->
    <section class="view active" data-view="qr">
      <div class="qr-grid">
        <div class="panel">
          <div class="panel-head">
            실시간 카메라
            <span class="pill" id="qr-status">대기 중</span>
          </div>
          <div class="panel-body">
            <div id="qr-reader"></div>
            <div class="qr-controls">
              <button class="btn btn-primary" id="btn-qr-start">카메라 시작</button>
              <button class="btn btn-ghost" id="btn-qr-stop">카메라 중지</button>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">학생 정보</div>
          <div class="panel-body">
            <div id="student-panel" class="empty">QR 코드를 카메라에 비추면 정보가 표시됩니다.</div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== 식사현황 ===== -->
    <section class="view" data-view="log">
      <div class="summary-card">
        <div>
          <div class="big" id="log-count">0</div>
        </div>
        <div>
          <div class="label">오늘 식사한 학생</div>
          <div class="date" id="log-date">-</div>
        </div>
        <div style="margin-left:auto">
          <button class="btn" id="btn-log-refresh">새로고침</button>
        </div>
      </div>
      <div id="log-list" class="grid"></div>
    </section>

    <!-- ===== 학생정보 ===== -->
    <section class="view" data-view="students">
      <div class="toolbar">
        <input type="text" id="stu-search" placeholder="이름 또는 학번으로 검색" />
        <button class="btn" id="btn-stu-refresh">새로고침</button>
      </div>
      <div id="stu-list" class="grid"></div>
    </section>

  </main>

  <!-- 에러 모달 (등록되지 않은 학생 / 중복) -->
  <div class="modal" id="error-modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-icon warn" id="modal-icon">!</div>
      <h2 id="modal-title">알림</h2>
      <p id="modal-message"></p>
      <button class="btn btn-primary" id="btn-modal-ok">확인</button>
    </div>
  </div>

  <!-- 카메라 권한 안내 모달 -->
  <div class="modal" id="cam-modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-icon info">i</div>
      <h2>카메라 권한이 필요합니다</h2>
      <p>주소창의 카메라 차단 아이콘을 눌러 허용으로 바꾼 뒤 다시 시도해 주세요.</p>
      <button class="btn btn-primary" id="btn-cam-ok">확인</button>
    </div>
  </div>

  <!-- 학생 상세 (식사 이력) -->
  <div class="modal" id="student-detail-modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="student-detail-card" id="student-detail-card" role="document">
      <div class="student-detail-head">
        <button type="button" class="student-detail-close" id="btn-student-detail-close" aria-label="닫기">×</button>
      </div>
      <div class="student-detail-body">
        <div class="student-detail-photo-wrap">
          <img class="student-detail-photo" id="student-detail-photo" src="" alt="" />
        </div>
        <div class="student-detail-title" id="student-detail-title"></div>
        <div class="student-detail-count-wrap">
          <div class="student-detail-count-label">총 식사 횟수</div>
          <div class="student-detail-count" id="student-detail-count">-</div>
        </div>
        <div class="student-detail-list-head">식사 기록</div>
        <div class="student-detail-list" id="student-detail-list"></div>
      </div>
    </div>
  </div>

<script>
(function () {
  'use strict';

  /* ---------- 상태 ---------- */
  var html5QrCode = null;
  var qrRunning = false;
  var scanCooldown = false;
  var awaitingAck = false;       // 에러 모달이 떠 있는 동안은 스캔 무시
  var currentView = 'qr';
  var studentsCache = null;
  var scanBeepAudioCtx = null;

  /** QR 인식 성공 시 — Web Audio: 매우 큰 비프(스퀘어 + 밴드 + 컴프) */
  function playScanSuccessBeep() {
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      if (!scanBeepAudioCtx) scanBeepAudioCtx = new AC();
      var ctx = scanBeepAudioCtx;
      if (ctx.state === 'suspended') ctx.resume();

      var t0 = ctx.currentTime;
      var dur = 0.22;
      var master = ctx.createGain();
      var comp = ctx.createDynamicsCompressor();
      comp.threshold.setValueAtTime(-28, t0);
      comp.knee.setValueAtTime(18, t0);
      comp.ratio.setValueAtTime(14, t0);
      comp.attack.setValueAtTime(0.002, t0);
      comp.release.setValueAtTime(0.12, t0);
      master.connect(comp);
      comp.connect(ctx.destination);

      master.gain.setValueAtTime(0.0001, t0);
      master.gain.exponentialRampToValueAtTime(1, t0 + 0.008);
      master.gain.setValueAtTime(1, t0 + dur * 0.55);
      master.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

      function addOsc(freq, detune, type, vol) {
        var o = ctx.createOscillator();
        var g = ctx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t0);
        if (detune) o.detune.setValueAtTime(detune, t0);
        g.gain.setValueAtTime(vol, t0);
        o.connect(g);
        g.connect(master);
        o.start(t0);
        o.stop(t0 + dur);
      }
      addOsc(523.25, 0, 'square', 0.55);
      addOsc(1046.5, 0, 'square', 0.52);
      addOsc(1568, 0, 'square', 0.38);
      addOsc(2093, 0, 'sawtooth', 0.14);
    } catch (e) { /* ignore */ }
  }

  /* ---------- 시계 ---------- */
  function tick() {
    var d = new Date();
    var pad = function (n) { return n < 10 ? '0' + n : '' + n; };
    var s = d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
          + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    var el = document.getElementById('clock');
    if (el) el.textContent = s;
  }
  setInterval(tick, 1000); tick();

  /* ---------- API 호출 ---------- */
  function api(action, params) {
    var qs = ['action=' + encodeURIComponent(action)];
    if (params) {
      for (var k in params) {
        if (params[k] !== undefined && params[k] !== null) {
          qs.push(encodeURIComponent(k) + '=' + encodeURIComponent(params[k]));
        }
      }
    }
    var url = GAS_API_URL + '?' + qs.join('&');
    return fetch(url, { method: 'GET', redirect: 'follow' })
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        });
  }

  /* ---------- 뷰 전환 ---------- */
  var navBtns = document.querySelectorAll('.nav-btn');
  var views = document.querySelectorAll('.view');
  function showView(name) {
    currentView = name;
    navBtns.forEach(function (b) {
      b.classList.toggle('active', b.getAttribute('data-view') === name);
    });
    views.forEach(function (v) {
      v.classList.toggle('active', v.getAttribute('data-view') === name);
    });
    if (name !== 'qr') stopQr();
    if (name === 'log') loadTodayLog();
    if (name === 'students') loadStudents();
  }
  navBtns.forEach(function (b) {
    b.addEventListener('click', function () { showView(b.getAttribute('data-view')); });
  });

  /* ---------- 상태 뱃지 ---------- */
  function setStatus(msg, cls) {
    var el = document.getElementById('qr-status');
    el.textContent = msg;
    el.className = 'pill qr-status ' + (cls || '');
  }

  /* ---------- 학생 패널 렌더링 ---------- */
  function escapeHtml(s) {
    return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function fallbackPhoto() {
    return 'data:image/svg+xml;utf8,' + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">'
      + '<rect width="200" height="200" fill="#222a3d"/>'
      + '<circle cx="100" cy="80" r="32" fill="#4fd1c5" opacity="0.5"/>'
      + '<rect x="50" y="120" width="100" height="60" rx="30" fill="#4fd1c5" opacity="0.5"/>'
      + '</svg>');
  }
  function ensurePhotoLarge(url) {
    if (!url) return '';
    return String(url).replace(/([?&])sz=w\d+/i, '$1sz=w1000');
  }
  function renderStudentPanel(student, opts) {
    opts = opts || {};
    var panel = document.getElementById('student-panel');
    panel.classList.remove('empty');
    var rawPhoto = student && student.photoUrl ? student.photoUrl : '';
    var photo = rawPhoto ? ensurePhotoLarge(rawPhoto) : fallbackPhoto();
    var html = ''
      + '<div class="photo-frame">'
      + '<img class="photo" src="' + escapeHtml(photo) + '" '
      + 'onerror="this.onerror=null;this.src=\'' + fallbackPhoto() + '\'" alt="" />'
      + '</div>'
      + '<div class="name">' + escapeHtml(student.name || '이름 없음') + '</div>'
      + '<div class="sid">' + escapeHtml(student.studentId || '') + '</div>';
    if (opts.greet) {
      html += '<div class="greet">' + escapeHtml(opts.greet) + '</div>';
    }
    if (opts.time) {
      html += '<div class="scan-time">' + escapeHtml(opts.time) + '</div>';
    }
    panel.innerHTML = html;
  }
  function clearStudentPanel(msg) {
    var panel = document.getElementById('student-panel');
    panel.classList.add('empty');
    panel.innerHTML = '';
    panel.textContent = msg || 'QR 코드를 카메라에 비추면 정보가 표시됩니다.';
  }

  /* ---------- 모달 ---------- */
  function openModal(id, opts) {
    var el = document.getElementById(id);
    if (!el) return;
    if (opts) {
      if (opts.title) document.getElementById('modal-title').textContent = opts.title;
      if (opts.message) document.getElementById('modal-message').textContent = opts.message;
      if (opts.icon) document.getElementById('modal-icon').className = 'modal-icon ' + opts.icon;
    }
    el.classList.add('is-open');
    el.setAttribute('aria-hidden', 'false');
  }
  function closeModal(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('is-open');
    el.setAttribute('aria-hidden', 'true');
  }
  document.getElementById('btn-modal-ok').addEventListener('click', function () {
    closeModal('error-modal');
    awaitingAck = false;
    clearStudentPanel();
    setStatus(qrRunning ? '스캔 중' : '대기 중', qrRunning ? 'ok' : '');
  });
  document.getElementById('btn-cam-ok').addEventListener('click', function () {
    closeModal('cam-modal');
  });

  /* ---------- 학생 상세 (식사 이력) 모달 ---------- */
  var studentDetailModal = document.getElementById('student-detail-modal');
  var studentDetailPhoto = document.getElementById('student-detail-photo');
  var studentDetailTitle = document.getElementById('student-detail-title');
  var studentDetailCount = document.getElementById('student-detail-count');
  var studentDetailList = document.getElementById('student-detail-list');

  function openStudentDetailModal(ctx) {
    ctx = ctx || {};
    var sid = String(ctx.studentId || '').trim();
    if (!sid) return;
    var nm = String(ctx.name || '').trim() || '이름 없음';
    var photo = ctx.photoUrl ? ensurePhotoLarge(ctx.photoUrl) : fallbackPhoto();
    studentDetailPhoto.src = photo;
    studentDetailPhoto.onerror = function () {
      studentDetailPhoto.onerror = null;
      studentDetailPhoto.src = fallbackPhoto();
    };
    studentDetailTitle.innerHTML = escapeHtml(nm) + '<span class="sid">(' + escapeHtml(sid) + ')</span>';
    studentDetailCount.textContent = '…';
    studentDetailList.innerHTML = '<div class="student-detail-loading">불러오는 중…</div>';
    studentDetailModal.classList.add('is-open');
    studentDetailModal.setAttribute('aria-hidden', 'false');

    api('getStudentHistory', { studentId: sid })
        .then(function (res) {
          if (!res || !res.ok) {
            studentDetailCount.textContent = '-';
            studentDetailList.innerHTML = '<div class="student-detail-error">'
                + escapeHtml((res && res.error) || '이력을 불러올 수 없습니다.') + '</div>';
            return;
          }
          var total = res.totalCount != null ? res.totalCount : (res.records && res.records.length) || 0;
          studentDetailCount.textContent = String(total);
          var recs = res.records || [];
          if (!recs.length) {
            studentDetailList.innerHTML = '<div class="student-detail-loading">기록된 식사가 없습니다.</div>';
            return;
          }
          studentDetailList.innerHTML = recs.map(function (r) {
            return '<div class="student-detail-list-item">' + escapeHtml(r.time || '-') + '</div>';
          }).join('');
        })
        .catch(function (err) {
          studentDetailCount.textContent = '-';
          studentDetailList.innerHTML = '<div class="student-detail-error">'
              + escapeHtml(err && err.message ? err.message : '서버 오류') + '</div>';
        });
  }

  function closeStudentDetailModal() {
    studentDetailModal.classList.remove('is-open');
    studentDetailModal.setAttribute('aria-hidden', 'true');
    studentDetailPhoto.src = '';
    studentDetailList.innerHTML = '';
  }

  document.getElementById('btn-student-detail-close').addEventListener('click', closeStudentDetailModal);
  studentDetailModal.addEventListener('click', function (e) {
    if (e.target === studentDetailModal) closeStudentDetailModal();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && studentDetailModal.classList.contains('is-open')) {
      closeStudentDetailModal();
    }
  });

  function onStudentCardActivate(ev) {
    if (ev.type === 'keydown' && ev.key !== 'Enter' && ev.key !== ' ') return;
    var card = ev.target.closest('.student-card--clickable');
    if (!card || !this.contains(card)) return;
    if (ev.type === 'keydown') ev.preventDefault();
    var id = String(card.getAttribute('data-student-id') || '').trim();
    if (!id) return;
    var name = card.getAttribute('data-student-name') || '';
    var photo = card.getAttribute('data-photo') || '';
    openStudentDetailModal({ studentId: id, name: name, photoUrl: photo });
  }
  var logListEl = document.getElementById('log-list');
  var stuListEl = document.getElementById('stu-list');
  if (logListEl) {
    logListEl.addEventListener('click', onStudentCardActivate);
    logListEl.addEventListener('keydown', onStudentCardActivate);
  }
  if (stuListEl) {
    stuListEl.addEventListener('click', onStudentCardActivate);
    stuListEl.addEventListener('keydown', onStudentCardActivate);
  }

  /* ---------- 스캔 처리 ---------- */
  function onScanSuccess(decodedText) {
    if (awaitingAck || scanCooldown) return;
    scanCooldown = true;
    setTimeout(function () { scanCooldown = false; }, 1500);

    setStatus('조회 중…', '');
    api('scan', { code: decodedText })
        .then(function (res) {
          if (!res) throw new Error('빈 응답');

          if (res.status === 'success') {
            setStatus('인식 완료', 'ok');
            playScanSuccessBeep();
            renderStudentPanel(res.student, { greet: '맛있게 식사하세요!', time: res.time });
            return;
          }
          if (res.status === 'duplicate') {
            awaitingAck = true;
            renderStudentPanel(res.student, { time: res.time });
            setStatus('중복 스캔', 'err');
            openModal('error-modal', {
              title: '중복 스캔 감지',
              message: '이미 식사한 학생입니다.',
              icon: 'warn'
            });
            return;
          }
          if (res.status === 'not_registered') {
            awaitingAck = true;
            clearStudentPanel('등록되지 않은 학생입니다.');
            setStatus('미등록', 'err');
            openModal('error-modal', {
              title: '등록되지 않은 학생',
              message: '등록이 안 된 학생입니다. 확인해주세요.',
              icon: 'warn'
            });
            return;
          }
          // invalid / error 등
          setStatus(res.message || '오류', 'err');
        })
        .catch(function (err) {
          setStatus('서버 오류: ' + (err && err.message || err), 'err');
        });
  }

  /* ---------- 카메라 (전면 facingMode: user 고정 우선) ---------- */
  function startQr() {
    if (qrRunning) return;
    if (typeof Html5Qrcode === 'undefined') {
      setStatus('QR 라이브러리 로드 실패', 'err');
      return;
    }
    setStatus('카메라 권한 요청 중…', '');

    if (!html5QrCode) html5QrCode = new Html5Qrcode('qr-reader');

    var config = {
      fps: 10,
      qrbox: function (vw, vh) {
        var w = Math.floor(Math.min(vw * 0.94, vw - 8));
        var h = Math.floor(Math.min(vh * 0.92, vh - 8));
        return { width: Math.max(120, w), height: Math.max(120, h) };
      },
      aspectRatio: 1.0
    };

    function onCamError() {}

    function markRunning() {
      qrRunning = true;
      setStatus('스캔 중', 'ok');
    }

    function handleCamFail(e) {
      qrRunning = false;
      var msg = (e && e.message) ? e.message : '카메라를 열 수 없습니다.';
      setStatus(msg, 'err');
      var n = (e && e.name) || '';
      if (n === 'NotAllowedError' || /permission/i.test(msg)) {
        openModal('cam-modal');
      }
    }

    html5QrCode
        .start({ facingMode: { exact: 'user' } }, config, onScanSuccess, onCamError)
        .catch(function () {
          return html5QrCode.start({ facingMode: 'user' }, config, onScanSuccess, onCamError);
        })
        .catch(function () {
          return Html5Qrcode.getCameras().then(function (devices) {
            if (!devices || !devices.length) {
              throw new Error('사용 가능한 카메라가 없습니다.');
            }
            var frontId = pickFrontCameraId(devices);
            if (!frontId) throw new Error('전면 카메라를 찾을 수 없습니다.');
            return html5QrCode.start(frontId, config, onScanSuccess, onCamError);
          });
        })
        .then(markRunning)
        .catch(handleCamFail);
  }

  /** 라벨 기준 전면 카메라 deviceId (facingMode 실패 시 보조) */
  function pickFrontCameraId(devices) {
    var re = /front|user|face|selfie|전면|셀카|내장|facetime/i;
    for (var i = 0; i < devices.length; i++) {
      if (re.test(String(devices[i].label || ''))) return devices[i].id;
    }
    return devices.length ? devices[0].id : null;
  }

  function stopQr() {
    if (!html5QrCode || !qrRunning) return;
    html5QrCode.stop().then(function () {
      qrRunning = false;
      setStatus('대기 중', '');
    }).catch(function () { qrRunning = false; });
  }

  document.getElementById('btn-qr-start').addEventListener('click', startQr);
  document.getElementById('btn-qr-stop').addEventListener('click', stopQr);

  /* ---------- 식사현황 ---------- */
  function loadTodayLog() {
    var listEl = document.getElementById('log-list');
    var countEl = document.getElementById('log-count');
    var dateEl = document.getElementById('log-date');
    listEl.innerHTML = '<div class="empty-state">불러오는 중…</div>';
    api('todayLog').then(function (res) {
      if (!res || !res.ok) {
        listEl.innerHTML = '<div class="empty-state">' + escapeHtml((res && res.error) || '오류') + '</div>';
        return;
      }
      countEl.textContent = String(res.count || 0);
      dateEl.textContent = res.date || '-';
      if (!res.entries || !res.entries.length) {
        listEl.innerHTML = '<div class="empty-state">아직 식사한 학생이 없습니다.</div>';
        return;
      }
      var html = res.entries.map(function (e) {
        var photo = e.photoUrl ? ensurePhotoLarge(e.photoUrl) : fallbackPhoto();
        var time = (e.time || '').slice(11, 19);
        return '<div class="student-card student-card--clickable" role="button" tabindex="0" '
             + 'data-student-id="' + escapeHtml(e.studentId || '') + '" '
             + 'data-student-name="' + escapeHtml(e.name || '') + '" '
             + 'data-photo="' + escapeHtml(photo) + '">'
             + '<img src="' + escapeHtml(photo) + '" onerror="this.onerror=null;this.src=\'' + fallbackPhoto() + '\'" alt="">'
             + '<div class="nm">' + escapeHtml(e.name || '-') + '</div>'
             + '<div class="meta">' + escapeHtml(e.studentId || '') + '</div>'
             + '<div class="time">' + escapeHtml(time) + '</div>'
             + '</div>';
      }).join('');
      listEl.innerHTML = html;
    }).catch(function (err) {
      listEl.innerHTML = '<div class="empty-state">서버 오류: ' + escapeHtml(err.message || '') + '</div>';
    });
  }
  document.getElementById('btn-log-refresh').addEventListener('click', loadTodayLog);

  /* ---------- 학생정보 ---------- */
  function loadStudents(force) {
    var listEl = document.getElementById('stu-list');
    if (studentsCache && !force) { renderStudents(studentsCache); return; }
    listEl.innerHTML = '<div class="empty-state">불러오는 중…</div>';
    api('students').then(function (res) {
      if (!res || !res.ok) {
        listEl.innerHTML = '<div class="empty-state">' + escapeHtml((res && res.error) || '오류') + '</div>';
        return;
      }
      studentsCache = res.students || [];
      renderStudents(studentsCache);
    }).catch(function (err) {
      listEl.innerHTML = '<div class="empty-state">서버 오류: ' + escapeHtml(err.message || '') + '</div>';
    });
  }
  function renderStudents(list) {
    var listEl = document.getElementById('stu-list');
    var q = String(document.getElementById('stu-search').value || '').trim().toLowerCase();
    var filtered = !q ? list : list.filter(function (s) {
      return (s.name || '').toLowerCase().indexOf(q) !== -1
          || (s.studentId || '').toLowerCase().indexOf(q) !== -1;
    });
    if (!filtered.length) {
      listEl.innerHTML = '<div class="empty-state">결과가 없습니다.</div>';
      return;
    }
    listEl.innerHTML = filtered.map(function (s) {
      var photo = s.photoUrl ? ensurePhotoLarge(s.photoUrl) : fallbackPhoto();
      return '<div class="student-card student-card--clickable" role="button" tabindex="0" '
           + 'data-student-id="' + escapeHtml(s.studentId || '') + '" '
           + 'data-student-name="' + escapeHtml(s.name || '') + '" '
           + 'data-photo="' + escapeHtml(photo) + '">'
           + '<img src="' + escapeHtml(photo) + '" onerror="this.onerror=null;this.src=\'' + fallbackPhoto() + '\'" alt="">'
           + '<div class="nm">' + escapeHtml(s.name || '-') + '</div>'
           + '<div class="meta">' + escapeHtml(s.studentId || '') + '</div>'
           + '</div>';
    }).join('');
  }
  document.getElementById('btn-stu-refresh').addEventListener('click', function () { loadStudents(true); });
  document.getElementById('stu-search').addEventListener('input', function () {
    if (studentsCache) renderStudents(studentsCache);
  });

  /* ---------- 시작 ---------- */
  showView('qr');
  // 페이지 로드 직후 자동 시작은 하지 않음 (브라우저 정책상 사용자 상호작용 후가 안정적)

})();
</script>

</body>
</html>
